name: Meta Ads Daily Report

on:
  schedule:
    # 08:00 Kyiv = 06:00 UTC (зима) / 05:00 UTC (літо)
    - cron: '0 6 * * *'      # щоденний звіт
    - cron: '30 6 * * 1'     # тижневий — понеділок
  workflow_dispatch:          # ручний запуск у будь-який час

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytz matplotlib requests

      - name: Run daily report
        if: github.event.schedule == '0 6 * * *' || github.event_name == 'workflow_dispatch'
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          META_TOKEN: ${{ secrets.META_TOKEN }}
        run: python meta_report.py daily

      - name: Run weekly report
        if: github.event.schedule == '30 6 * * 1'
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          META_TOKEN: ${{ secrets.META_TOKEN }}
        run: python meta_report.py weekly
